<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel NPS MetLife × iFood</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f1f5f9; color:#1e293b; }
        
        header { background:linear-gradient(135deg,#1e293b,#334155); color:white; padding:20px; text-align:center; }
        header h1 { font-size:20px; font-weight:700; margin-bottom:4px; }
        header p { font-size:11px; opacity:.9; }
        
        .container { max-width:1200px; margin:20px auto; padding:0 16px; }
        
        .card { background:white; border-radius:8px; padding:16px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
        .card-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#64748b; margin-bottom:12px; }
        
        .big-stat { text-align:center; padding:12px; }
        .big-stat .valor { font-size:42px; font-weight:800; color:#1e40af; margin-bottom:4px; }
        .big-stat .label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#64748b; }
        .big-stat .delta { font-size:13px; margin-top:4px; }
        .delta.positivo { color:#059669; }
        .delta.negativo { color:#b91c1c; }
        
        .distribuicao { display:flex; gap:8px; margin-top:12px; }
        .dist-item { flex:1; text-align:center; padding:8px; background:#f1f5f9; border-radius:6px; }
        .dist-item .pct { font-size:16px; font-weight:700; margin-bottom:2px; }
        .dist-item .label { font-size:10px; color:#64748b; }
        .prom { color:#059669; }
        .neu { color:#94a3b8; }
        .det { color:#be123c; }
        
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        
        .cov-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:16px; }
        .cov-card { background:white; border-radius:8px; padding:12px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
        .cov-title { font-size:13px; font-weight:700; color:#1e293b; margin-bottom:8px; }
        .cov-stats { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; font-size:12px; }
        .cov-stats .nps { font-weight:700; color:#1e40af; }
        .cov-stats .delta { font-size:11px; }
        .cov-legend { display:flex; gap:10px; margin-top:6px; font-size:10px; color:#64748b; }
        .cov-legend span { display:flex; align-items:center; gap:3px; }
        .cov-legend .dot { display:inline-block; width:8px; height:8px; border-radius:2px; }
        
        .tabul-list { list-style:none; }
        .tabul-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f1f5f9; }
        .tabul-item:last-child { border-bottom:none; }
        .tabul-tema { font-size:12px; color:#1e293b; flex:1; }
        .tabul-pct { font-size:13px; font-weight:700; color:#1e40af; margin-right:8px; }
        .tabul-var { font-size:10px; padding:2px 6px; border-radius:4px; }
        .tabul-var.alta { background:#dcfce7; color:#166534; }
        .tabul-var.baixa { background:#fce7e7; color:#991b1b; }
        
        .btn { display:inline-block; padding:6px 12px; background:#1e40af; color:white; border:none; border-radius:6px; font-size:11px; cursor:pointer; text-decoration:none; }
        .btn:hover { background:#1e3a8a; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:1000; }
        .modal.active { display:flex; align-items:center; justify-content:center; }
        .modal-content { background:white; border-radius:8px; max-width:600px; width:90%; max-height:80vh; display:flex; flex-direction:column; }
        .modal-header { padding:16px 24px; border-bottom:1px solid #e2e8f0; }
        .modal-header h3 { font-size:14px; font-weight:700; color:#1e293b; }
        .modal-body { padding:16px 24px; overflow-y:auto; flex:1; }
        .modal-close { position:absolute; top:16px; right:24px; font-size:24px; cursor:pointer; color:#64748b; }
        
        .comment { margin-bottom:12px; padding:10px; background:#f1f5f9; border-left:3px solid #1e40af; border-radius:4px; }
        .comment-meta { font-size:10px; color:#64748b; margin-bottom:4px; }
        .comment-text { font-size:12px; color:#1e293b; }
        
        .section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; padding:6px 10px; border-radius:6px; }
        .section-promotores { color:#059669; background:#f0fdf4; }
        .section-detratores { color:#be123c; background:#fff1f2; }
        .tabul-item-v2 { padding:10px 0; border-bottom:1px solid #f1f5f9; }
        .tabul-item-v2:last-child { border-bottom:none; }
        .tabul-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .tabul-sparkline { width:100%; }
        .tabul-months { display:flex; justify-content:space-between; font-size:8px; color:#94a3b8; padding:0 2px; margin-top:2px; }
        .cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:12px; margin:16px 0; }
        .month-card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:16px; }
        .month-card .mc-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#64748b; margin-bottom:6px; }
        .month-card .mc-value { font-size:24px; font-weight:700; color:#1e293b; }
        .month-card .mc-sub { font-size:11px; color:#64748b; margin-top:4px; }
        .month-card .mc-tema { font-size:11px; color:#64748b; margin-top:6px; }
        .qual-section { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:20px; margin-bottom:16px; }
        .qual-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#64748b; margin-bottom:14px; }
        .qual-table { width:100%; border-collapse:collapse; font-size:13px; }
        .qual-table th { text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:#64748b; border-bottom:2px solid #e2e8f0; padding:8px 10px; }
        .qual-table td { padding:9px 10px; border-bottom:1px solid #f1f5f9; }
        .qual-table tr:last-child td { border-bottom:none; }
        .qual-table tr:hover td { background:#f8fafc; }
        .qual-table .tdright { text-align:right; }
        .peak { background:#fef3c7; font-weight:600; }
        .diag { border-left:4px solid #059669; background:#f8fafc; border-radius:0 10px 10px 0; padding:16px 20px; margin-top:16px; }
        .diag h3 { font-size:12px; font-weight:700; color:#059669; margin-bottom:10px; text-transform:uppercase; letter-spacing:.06em; }
        .diag p { font-size:13px; line-height:1.6; color:#1e293b; margin-bottom:6px; }
        .nota-met { font-size:11px; color:#94a3b8; margin-top:10px; }
    </style>
</head>
