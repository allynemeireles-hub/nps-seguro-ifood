        function abrirModal(tema) {
            const data = COMMENTS_DATA[tema];
            if (!data) return;
            
            document.getElementById('modal-titulo').textContent = 'Coment\u00e1rios — ' + tema;
            
            const divProm = document.getElementById('modal-promotores');
            divProm.innerHTML = '';
            (data.promotores || []).forEach(c => {
                divProm.innerHTML += `<div class="comment">
                    <div class="comment-meta">${c.mes} | ${c.cov} | NPS ${c.nps}</div>
                    <div class="comment-text">${c.texto}</div>
                </div>`;
            });
            if (!divProm.innerHTML) divProm.innerHTML = '<p style="color:#94a3b8;font-size:12px">Sem coment\u00e1rios de promotores neste tema.</p>';
            
            const divDet = document.getElementById('modal-detratores');
            divDet.innerHTML = '';
            (data.detratores || []).forEach(c => {
                divDet.innerHTML += `<div class="comment">
                    <div class="comment-meta">${c.mes} | ${c.cov} | NPS ${c.nps}</div>
                    <div class="comment-text">${c.texto}</div>

            });

            document.getElementById('modal').classList.add('active');
        }
        
        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }
