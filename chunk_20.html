texto": "Não recebi o tempo que fiquei de atestado", "nps": 1, "cov": "DIT", "mes": "jul./26"}, {"texto": "Eu, ter ficado completamente desamparado por muito tempo, e estar com sequelas permanentes, me impossibilitando de tocar minha vida normalmente aos 44 anos de idade, com sequelas gravíssimas que me impedem de manter", "nps": 0, "cov": "IPA", "mes": "jul./26"}, {"texto": "Me pagaram 6%sobre amputação...sendo  que foi amputação se20%", "nps": 1, "cov": "DMHO", "mes": "abr./25"}]}, "Processo de abertura": {"promotores": [{"texto": "Muito rápido", "nps": 10, "cov": "IPA", "mes": "abr./25"}, {"texto": "Processo de abertura tranquilo", "nps": 10, "cov": "DIT", "mes": "jun./25"}, {"texto": "Muito bom e rápido", "nps": 10, "cov": "DIT", "mes": "jun./25"}, {"texto": "Meu acidente me motivou muito", "nps": 10, "cov": "DMHO", "mes": "jun./25"}], "detratores": [{"texto": "Enviei todos os documentos mais de uma vez pra mais de um e-mail pois me pediram pra enviar novamente. Não consegui suporte pelo Whats me falaram que não podiam fazer nada era so por email. Ja fazem 3 meses que to aguardando o que era pra sair em até 30 dias mas até hoje a perícia não saiu.  Vou procurar um Adevogado para me orientar como devo prosseguir com a o acionamento pois como ja fazem 3 meses que estou somente enviando documentos e nunca faço  a perícia não sei mais o que fazer.", "nps": 0, "cov": "IPA", "mes": "jul./26"}, {"texto": "Não tive nem um ressarcimento até agora", "nps": 5, "cov": "IPA", "mes": "mai./25"}, {"texto": "Não recebi nada", "nps": 3, "cov": "DIT", "mes": "mai./25"}, {"texto": "Um péssimo seguro deve ser porque é de graça quando a gente precisa não é aprovado essa bosta era, mas fácil nem ter se quando precisar não aprovado o que precisa aconteceu para aprovar perder um braço uma perna misericórdia eu sofri um acidente indo fazer uma entrega ralei-me todo trincou um osso da minha mão aí a gente acionar o seguro porque a gente não tem condições de trabalhar e mesmo que nada seguro pagar já é ruim imagina o não pagar é que fornecido só perde o meu tempo acionado esse segurou vocês têm que colocar os requisitos para ser aprovado falando que a rota não condiz sendo que foi na última rota como eu iria fazer outro sendo que eu estava todo quebrado vai entender vocês só dificultam mandei foto e nada, mas fácil não acionar um segundo horrível", "nps": 0, "cov": "DIT", "mes": "mai./25"}]}, "Tempo de análise": {"promotores": [{"texto": "Bom atendimento", "nps": 10, "cov": "DMHO", "mes": "abr./25"}, {"texto": "Muito rápido", "nps": 10, "cov": "DIT", "mes": "abr./25"}, {"texto": "Muito rápido", "nps": 10, "cov": "DIT", "mes": "abr./25"}, {"texto": "Bom atendimento", "nps": 10, "cov": "IPA", "mes": "abr./25"}], "detratores": [{"texto": "Cada documento enviado levava 30 dias pra retorno, além disso os atendentes mais perdido que tudo. Já foi", "nps": 0, "cov": "DMHO", "mes": "jul./26"}, {"texto": "Na verdade como todo o seguro e muito docu", "nps": 5, "cov": "IPA", "mes": "jul./26"}, {"texto": "Demorando no segundo atestado", "nps": 2, "cov": "DIT", "mes": "mai./25"}, {"texto": "Muito demorado, e burocrático", "nps": 4, "cov": "DIT", "mes": "mai./25"}]}, "Comunicações sobre o processo": {"promotores": [{"texto": "Fui muito bem atendida,informada .", "nps": 10, "cov": "IPA", "mes": "mai./25"}, {"texto": "Atendimento super tranquilo", "nps": 9, "cov": "DIT", "mes": "jun./25"}, {"texto": "Me informou todo o processo até o pagamento", "nps": 10, "cov": "DIT", "mes": "jun./25"}, {"texto": "Informativo sobre o andamento do processo.", "nps": 10, "cov": "DMHO", "mes": "jun./25"}], "detratores": [{"texto": "A falta de compreensão com quem sempre esteve ao lado do ifood e no final ficou na mão e com a tibia toda quebrada !", "nps": 0, "cov": "DIT", "mes": "abr./25"}, {"texto": "Vocês negaram valor sendo que estava no hospital", "nps": 1, "cov": "DIT", "mes": "abr./25"}, {"texto": "Falta de comunicação com o ifood, não recebi nada.", "nps": 0, "cov": "DIT", "mes": "abr./25"}, {"texto": "Não recebi o seguro mesmo sendo legível", "nps": 0, "cov": "DIT", "mes": "mai./25"}]}, "Acompanhamento do processo": {"promotores": [{"texto": "Nota 10 pra assistente social, mas 0 pra quem me respondia por email.", "nps": 10, "cov": "Aux. Gestação", "mes": "mai./25"}, {"texto": "A atenção que mim foi dada durante todo processo!", "nps": 10, "cov": "IPA", "mes": "jun./25"}, {"texto": "Fui atendido", "nps": 9, "cov": "DIT", "mes": "jun./25"}, {"texto": "A atenção recebida e a agilidade no processo.", "nps": 9, "cov": "IPA", "mes": "jun./25"}], "detratores": [{"texto": "O auxílio é por 30 dias", "nps": 4, "cov": "DIT", "mes": "mai./25"}, {"texto": "Não tive bons retorno após meus 3 meses de recuperação… ou seja a perícia não cuidou da avaliação como teria que ser", "nps": 4, "cov": "IPA", "mes": "mai./25"}, {"texto": "Desrespeito não ter valiado corretamente", "nps": 0, "cov": "DIT", "mes": "mai./25"}, {"texto": "Não me deram nenhum beneficio", "nps": 0, "cov": "DIT", "mes": "mai./25"}]}};
        
        function abrirModal(tema) {
            document.getElementById('modal-titulo').textContent = tema;
            const data = COMMENTS_DATA[tema] || {promotores: [], detratores: []};
            
            const promDiv = document.getElementById('modal-promotores');
            const detDiv = document.getElementById('modal-detratores');
            
            if (data.promotores.length === 0) {
                promDiv.innerHTML = '<p style="font-size:12px;color:#94a3b8">Nenhum comentário de promotores nesta categoria.</p>';
            } else {
                promDiv.innerHTML = data.promotores.map(c => 
                    `<div class="comment">
                        <div class="comment-meta">NPS ${c.nps} · ${c.cov} · ${c.mes}</div>
                        <div class="comment-text">${c.texto}</div>
                    </div>`
                ).join('');
            }
            
            if (data.detratores.length === 0) {
                detDiv.innerHTML = '<p style="font-size:12px;color:#94a3b8">Nenhum comentário de detratores nesta categoria.</p>';
            } else {
                detDiv.innerHTML = data.detratores.map(c => 
                    `<div class="comment">
                        <div class="comment-meta">NPS ${c.nps} · ${c.cov} · ${c.mes}</div>
                        <div class="comment-text">${c.texto}</div>
                    </div>`
                ).join('');
            }
            
            document.getElementById('modal').classList.add('active');
        }
        
        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
