        function abrirModal(tema) {
            document.getElementById('modal-titulo').textContent = tema;
            const data = COMMENTS_DATA[tema] || {promotores: [], detratores: []};
            
            const promDiv = document.getElementById('modal-promotores');
            const detDiv = document.getElementById('modal-detratores');
            
            if (data.promotores.length === 0) {
                promDiv.innerHTML = '<p style="font-size:12px;color:#94a3b8">Nenhum comentário de promotores nesta categoria.</p>';
            } else {
                promDiv.innerHTML = data.promotores.map(c => 
                    `<div class="comment">
                        <div class="comment-meta">NPS ${c.nps} · ${c.cov} · ${c.mes}</div>
                        <div class="comment-text">${c.texto}</div>
                    </div>`
                ).join('');
            }
            
            if (data.detratores.length === 0) {
                detDiv.innerHTML = '<p style="font-size:12px;color:#94a3b8">Nenhum comentário de detratores nesta categoria.</p>';
            } else {
                detDiv.innerHTML = data.detratores.map(c => 
                    `<div class="comment">
                        <div class="comment-meta">NPS ${c.nps} · ${c.cov} · ${c.mes}</div>
                        <div class="comment-text">${c.texto}</div>
                    </div>`
                ).join('');
            }
            
            document.getElementById('modal').classList.add('active');
        }
        
        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
