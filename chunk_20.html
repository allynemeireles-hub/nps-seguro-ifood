
    <script>
        const COMMENTS_DATA = {"Suporte e atendimento": {"promotores": [{"texto": "Informa\u00e7\u00f5es claras e precisas e principalmente sem aquelas burocracias terr\u00edveis que sempre fizeram parte das seguradoras.", "nps": 9, "cov": "IPA", "mes": "mai./26"}, {"texto": "Fui bem atendido", "nps": 10, "cov": "DMHO", "mes": "mai./26"}, {"texto": "A aten\u00e7\u00e3o que foi dada", "nps": 9, "cov": "DIT", "mes": "mai./26"}, {"texto": "Muito bom", "nps": 10, "cov": "DIT", "mes": "mai./26"}], "detratores": [{"texto": "Demorava", "nps": 5, "cov": "IPA", "mes": "mai./26"}, {"texto": "P\u00e9ssimo atendimento, pior tempo de an\u00e1lise, processo de abertura insalubre, p\u00e9ssima comunica\u00e7\u00e3o sobre o processo, valor recebido \u00e9 o \u00fanico \"mais ou menos\" dessa quest\u00e3o, ficou aceit\u00e1vel, mas \u00e9 apenas o valor, o restante?", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "Eu n\u00e3o consegui ainda abrir nenhum", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "Sofri um acidente de moto, onde veio a romper o ligamento do CRUZADO ANTERIOR, E LESAO DO MENISCO. Hoje estou sem trabalhar a 4 meses n\u00e3o recebi nenhum suporte.", "nps": 0, "cov": "DIT", "mes": "mai./26"}]}, "Valor recebido": {"promotores": [{"texto": "Nada", "nps": 10, "cov": "IPA", "mes": "mai./26"}, {"texto": "Recebi uma quantia, mas foi o m\u00ednimo, ainda fiquei no preju\u00edzo.", "nps": 9, "cov": "DIT", "mes": "mai./25"}, {"texto": "Tempo de an\u00e1lise Atendimento Valor pago", "nps": 10, "cov": "DIT", "mes": "mai./25"}, {"texto": "Muito obrigado Empresa seria", "nps": 10, "cov": "DIT", "mes": "mai./25"}], "detratores": [{"texto": "N\u00e3o recebi", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "Y", "nps": 5, "cov": "IPA", "mes": "mai./26"}, {"texto": "Me depositaram um valor que n\u00e3o condiz com que fala no aplicativo do iFood meu apartamento \u00e9 de 60 dias por les\u00e3o \u00f3ssea.", "nps": 2, "cov": "DMHO", "mes": "mai./26"}, {"texto": "N\u00e3o recebi nada", "nps": 0, "cov": "DIT", "mes": "mai./26"}]}, "Processo de abertura": {"promotores": [{"texto": "simplicidade no andamento", "nps": 10, "cov": "DIT", "mes": "mai./26"}, {"texto": "Muito obrigado bom atendimento r\u00e1pido", "nps": 10, "cov": "IPA", "mes": "mai./26"}, {"texto": "Ate agora estou aguardando resposta n\u00e3o recebi nada ainda", "nps": 10, "cov": "DIT", "mes": "mai./26"}, {"texto": "F\u00e1cil e", "nps": 10, "cov": "DIT", "mes": "mai./26"}], "detratores": [{"texto": "N\u00e3o fui bem atendido. Negaram meu seguro, eu com atestado m\u00e9dico de 7 + 2 dias. N\u00e3o recomendo a ningu\u00e9m, s\u00f3 me fizeram perder tempo", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "Nap consegui enviar meus documentos 2 dias tentando.", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "N\u00e3o me deram o m\u00ednimo de suporte", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "Processo burocr\u00e1tico, sem respeito nenhum ao entregador nem todo mundo trabalha com fraude.", "nps": 1, "cov": "DIT", "mes": "mai./26"}]}, "Tempo de an\u00e1lise": {"promotores": [{"texto": "Muito bom", "nps": 10, "cov": "DMHO", "mes": "mai./26"}, {"texto": "Primeiramente agra\u00e7o a Deus por tudo. Metlefe Brasil seguros acredito e continua acreditando gra\u00e7as a Deus correspondeu a altura parab\u00e9ns.", "nps": 10, "cov": "DIT", "mes": "mai./26"}, {"texto": "Achei bem rapido a resolu\u00e7\u00e3o da analise.", "nps": 9, "cov": "DIT", "mes": "mai./26"}, {"texto": "Foi muito r\u00e1pido o processo,e a finaliza\u00e7\u00e3o tamb\u00e9m", "nps": 9, "cov": "IPA", "mes": "mai./26"}], "detratores": [{"texto": "Eu poderia dar at\u00e9 uma nota 10 mas devido o n\u00e3o pagamento de um acidente o qual quebrei o dedo.", "nps": 1, "cov": "DMHO", "mes": "mai./26"}, {"texto": "Meu pedido de seguro n\u00e3o foi aceito por n\u00e3o estar em rota na hora do acidente.", "nps": 1, "cov": "DIT", "mes": "mai./26"}, {"texto": "Muita demora pra manda documentos", "nps": 3, "cov": "DMHO", "mes": "mai./26"}, {"texto": "Sofri o acidente at\u00e9 agora n\u00e3o recebi valor nenhum precisando de dinheiro pra fazer o acompanhamento.", "nps": 0, "cov": "DIT", "mes": "mai./26"}]}, "Comunica\u00e7\u00f5es sobre o processo": {"promotores": [{"texto": "Eu n\u00e3o sabia ter direito a seguro por les\u00e3o permanente, s\u00f3 fiz o sinistro 5 dias antes do prazo de um ano e a seguradora est\u00e1 me dando todo suporte. Obrigada", "nps": 10, "cov": "IPA", "mes": "mai./26"}, {"texto": "A met life juntamente com o ifood notificou me em todo tempo sobre o processo fazendo com que eu tivesse ci\u00eancia de tudo", "nps": 9, "cov": "IPA", "mes": "mai./26"}, {"texto": "Alguns pontos que v\u00e3o melhorar com tempo, mais foi bem tranquilo", "nps": 9, "cov": "IPA", "mes": "mai./26"}, {"texto": "Fui muito bem atendida,informada.", "nps": 10, "cov": "IPA", "mes": "mai./25"}], "detratores": [{"texto": "Todas as vezes que entrei em contato, tanto via telefone, whatsapp e email, os atendentes foram horr\u00edveis, sempre uma informa\u00e7\u00e3o diferente da anterior.", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "N\u00e3o tive \u00eaxito no meu seguro", "nps": 6, "cov": "DIT", "mes": "mai./26"}, {"texto": "N\u00e3o resolveram o meu problema e nem fi", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "Fiquei uma semana enviando e reenviando documenta\u00e7\u00e3o, e s\u00f3 fiquei sabendo que n\u00e3o ia receber 40 dias depois.", "nps": 0, "cov": "DIT", "mes": "mai./26"}]}, "Acompanhamento do processo": {"promotores": [{"texto": "O acompanhamento com m\u00e9dico especialista", "nps": 9, "cov": "IPA", "mes": "mai./26"}, {"texto": "Nota 10 pra assistente social, mas 0 pra quem me respondia por email.", "nps": 10, "cov": "Aux. Gesta\u00e7\u00e3o", "mes": "mai./25"}, {"texto": "A aten\u00e7\u00e3o que mim foi dada durante todo processo!", "nps": 10, "cov": "IPA", "mes": "jun./25"}, {"texto": "Fui atendido", "nps": 9, "cov": "DIT", "mes": "jun./25"}], "detratores": [{"texto": "At\u00e9 hoje n\u00e3o consegui \u00f3 benef\u00edcios", "nps": 0, "cov": "DIT", "mes": "mai./26"}, {"texto": "O aux\u00edlio \u00e9 por 30 dias", "nps": 4, "cov": "DIT", "mes": "mai./25"}, {"texto": "N\u00e3o tive bons retorno ap\u00f3s meus 3 meses de recupera\u00e7\u00e3o.", "nps": 4, "cov": "IPA", "mes": "mai./25"}, {"texto": "Desrespeito n\u00e3o ter valiado corretamente", "nps": 0, "cov": "DIT", "mes": "mai./25"}]}};
        
        function abrirModal(tema) {
            document.getElementById('modal-titulo').textContent = tema;
            const data = COMMENTS_DATA[tema] || {promotores: [], detratores: []};
            
            const promDiv = document.getElementById('modal-promotores');
            const detDiv = document.getElementById('modal-detratores');
            
            if (data.promotores.length === 0) {
                promDiv.innerHTML = '<p style="font-size:12px;color:#94a3b8">Nenhum coment\u00e1rio de promotores nesta categoria.</p>';
            } else {
                promDiv.innerHTML = data.promotores.map(c => 
                    `<div class="comment">
                        <div class="comment-meta">NPS ${c.nps} \u00b7 ${c.cov} \u00b7 ${c.mes}</div>
                        <div class="comment-text">${c.texto}</div>
                    </div>`
                ).join('');
            }
            
            if (data.detratores.length === 0) {
                detDiv.innerHTML = '<p style="font-size:12px;color:#94a3b8">Nenhum coment\u00e1rio de detratores nesta categoria.</p>';
            } else {
                detDiv.innerHTML = data.detratores.map(c => 
                    `<div class="comment">
                        <div class="comment-meta">NPS ${c.nps} \u00b7 ${c.cov} \u00b7 ${c.mes}</div>
                        <div class="comment-text">${c.texto}</div>
                    </div>`
                ).join('');
            }
            
            document.getElementById('modal').classList.add('active');
        }
        
        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
